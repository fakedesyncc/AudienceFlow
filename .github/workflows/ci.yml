name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gateway:
    name: Go ingest gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingest-gateway
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/ingest-gateway/go.mod
          cache-dependency-path: services/ingest-gateway/go.sum
      - run: go test ./...

  analytics-api:
    name: Java analytics API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics-api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -q test

  vision-worker:
    name: Python vision worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m py_compile services/vision-worker/app/main.py

  web:
    name: React web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - contour: demo
            base_path: /AudienceFlow/
          - contour: work
            base_path: /AudienceFlow/work/
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - run: npm ci
      - run: npm run build:${{ matrix.contour }}
        env:
          VITE_PUBLIC_CONTOUR: ${{ matrix.contour }}
          VITE_BASE_PATH: ${{ matrix.base_path }}
          VITE_API_URL: ${{ matrix.contour == 'work' && 'https://api.example.edu/api' || '' }}
          VITE_ENABLE_SW: "false"

  desktop-client:
    name: JavaFX desktop client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: services/desktop-client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -q package
