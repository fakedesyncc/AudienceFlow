name: Build Desktop Clients

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-runtime:
    name: Desktop runtime (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: services/desktop-client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -q javafx:jlink
      - uses: actions/upload-artifact@v7
        with:
          name: audienceflow-desktop-${{ runner.os }}
          path: services/desktop-client/target/audienceflow-desktop
