name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - run: npm ci
      - name: Build demo site
        run: npm run build:demo
        env:
          VITE_PUBLIC_CONTOUR: demo
          VITE_BASE_PATH: /AudienceFlow/
          VITE_ENABLE_SW: "false"
      - name: Stage demo site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/audienceflow-pages"
          mkdir -p "$RUNNER_TEMP/audienceflow-pages"
          cp -R dist/. "$RUNNER_TEMP/audienceflow-pages/"
      - name: Build work site
        run: npm run build:work
        env:
          VITE_PUBLIC_CONTOUR: work
          VITE_API_URL: ${{ vars.VITE_WORK_API_URL }}
          VITE_BASE_PATH: /AudienceFlow/work/
          VITE_ENABLE_SW: "false"
      - name: Stage work site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/audienceflow-pages/work"
          mkdir -p "$RUNNER_TEMP/audienceflow-pages/work"
          cp -R dist/. "$RUNNER_TEMP/audienceflow-pages/work/"
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/audienceflow-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
