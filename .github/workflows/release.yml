name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.2.0
        required: true
        type: string
      prerelease:
        description: Mark release as prerelease
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  web:
    name: Web demo artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_BASE_PATH: /AudienceFlow/
      - uses: actions/upload-artifact@v7
        with:
          name: audienceflow-web
          path: services/web/dist
          if-no-files-found: error

  desktop:
    name: Desktop runtime (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest
    defaults:
      run:
        working-directory: services/desktop-client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -q javafx:jlink
      - uses: actions/upload-artifact@v7
        with:
          name: audienceflow-desktop-${{ matrix.name }}
          path: services/desktop-client/target/audienceflow-desktop
          if-no-files-found: error

  android:
    name: Android APK artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Detect Android project
        id: android
        shell: bash
        run: |
          if [ ! -d services/mobile-android ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Android project is not present; release will continue without APK." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"
          if [ -x services/mobile-android/gradlew ] || [ -f services/mobile-android/gradlew ]; then
            echo "gradle_cmd=./gradlew" >> "$GITHUB_OUTPUT"
          elif [ -f services/mobile-android/build.gradle ] || [ -f services/mobile-android/build.gradle.kts ]; then
            echo "gradle_cmd=gradle" >> "$GITHUB_OUTPUT"
          else
            echo "::error::services/mobile-android exists, but no Gradle wrapper or root build.gradle was found."
            exit 1
          fi

      - uses: actions/setup-java@v5
        if: steps.android.outputs.exists == 'true'
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Gradle when wrapper is absent
        if: steps.android.outputs.exists == 'true' && steps.android.outputs.gradle_cmd == 'gradle'
        shell: bash
        run: |
          GRADLE_VERSION=8.14.3
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Accept Android SDK licenses
        if: steps.android.outputs.exists == 'true'
        shell: bash
        run: |
          if [ -z "${ANDROID_HOME:-}" ]; then
            echo "::error::ANDROID_HOME is not set on this runner."
            exit 1
          fi

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ -x "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses >/dev/null || true
          fi

      - name: Build debug APK
        if: steps.android.outputs.exists == 'true'
        shell: bash
        working-directory: services/mobile-android
        run: |
          chmod +x gradlew 2>/dev/null || true
          ${{ steps.android.outputs.gradle_cmd }} --no-daemon assembleDebug

      - name: Collect APK
        if: steps.android.outputs.exists == 'true'
        shell: bash
        run: |
          mkdir -p android-apk
          find services/mobile-android -type f -name "*.apk" -path "*/build/outputs/apk/*" -exec cp {} android-apk/ \;

          if ! compgen -G "android-apk/*.apk" >/dev/null; then
            echo "::error::Gradle finished, but no APK was found under build/outputs/apk."
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        if: steps.android.outputs.exists == 'true'
        with:
          name: audienceflow-android-apk
          path: android-apk/*.apk
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [web, desktop, android]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          path: release-input

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets
          tar -C release-input/audienceflow-web -czf release-assets/audienceflow-web.tar.gz .

          for dir in release-input/audienceflow-desktop-*; do
            asset="release-assets/$(basename "$dir").tar.gz"
            tar -C "$dir" -czf "$asset" .
          done

          for apk in release-input/audienceflow-android-apk/*.apk; do
            cp "$apk" "release-assets/$(basename "$apk")"
          done

          if ! compgen -G "release-assets/*" >/dev/null; then
            echo "::error::No release assets were prepared."
            exit 1
          fi

          ls -la release-assets

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^v[0-9]+(\.[0-9]+){2}([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Release version must look like v0.2.0 or v0.2.0-beta.1."
            exit 1
          fi

          {
            echo "# AudienceFlow ${VERSION}"
            echo
            echo "В релиз входят собранные артефакты:"
            echo
            echo "- web demo для GitHub Pages;"
            echo "- desktop runtime для Linux, macOS и Windows;"
            echo "- Android APK, если в репозитории есть services/mobile-android."
            echo
            echo "Docker images публикуются отдельным workflow Publish GHCR Images."
          } > release-notes.md

          mapfile -t ASSETS < <(find release-assets -maxdepth 1 -type f -print | sort)

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${ASSETS[@]}" --clobber
          else
            FLAGS=(--target "$GITHUB_SHA" --title "AudienceFlow ${VERSION}" --notes-file release-notes.md)
            if [ "$PRERELEASE" = "true" ]; then
              FLAGS+=(--prerelease)
            fi
            gh release create "$VERSION" "${ASSETS[@]}" "${FLAGS[@]}"
          fi

