services:
  postgres:
    image: postgres:17-alpine
    container_name: audienceflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-audienceflow}
      POSTGRES_USER: ${POSTGRES_USER:-audienceflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audienceflow} -d ${POSTGRES_DB:-audienceflow}"]
      interval: 5s
      timeout: 5s
      retries: 12

  ingest-gateway:
    build:
      context: ./services/ingest-gateway
    container_name: audienceflow-ingest
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8081
      DATABASE_URL: postgres://${POSTGRES_USER:-audienceflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-audienceflow}?sslmode=disable
      INGEST_API_KEY: ${INGEST_API_KEY:?INGEST_API_KEY is required}
      BATCH_SIZE: 64
      FLUSH_INTERVAL: 1s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  analytics-api:
    build:
      context: ./services/analytics-api
    container_name: audienceflow-api
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-audienceflow}
      JDBC_DATABASE_USERNAME: ${POSTGRES_USER:-audienceflow}
      JDBC_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      TECHNICIAN_EMAIL: ${TECHNICIAN_EMAIL:?TECHNICIAN_EMAIL is required}
      TECHNICIAN_PASSWORD: ${TECHNICIAN_PASSWORD:?TECHNICIAN_PASSWORD is required}
      TEACHER_EMAIL: ${TEACHER_EMAIL:?TEACHER_EMAIL is required}
      TEACHER_PASSWORD: ${TEACHER_PASSWORD:?TEACHER_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  vision-worker:
    profiles: ["worker"]
    build:
      context: ./services/vision-worker
    container_name: audienceflow-vision
    restart: unless-stopped
    environment:
      GATEWAY_URL: http://ingest-gateway:8081/v1/events
      INGEST_API_KEY: ${INGEST_API_KEY:?INGEST_API_KEY is required}
      ROOM_ID: 1
      WORKER_ID: docker-simulated-camera
      CAMERA_SOURCE: simulation
      DETECTOR: simulation
      SEND_INTERVAL_SECONDS: 5
      STABILIZATION_WINDOW: 5
      PREVIEW_ENABLED: "true"
      PREVIEW_ADDR: 0.0.0.0:8090
      PREVIEW_WIDTH: 960
      PREVIEW_JPEG_QUALITY: 82
    depends_on:
      - ingest-gateway
    ports:
      - "8090:8090"

  web:
    build:
      context: ./services/web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
        VITE_BASE_PATH: /
    container_name: audienceflow-web
    restart: unless-stopped
    depends_on:
      - analytics-api
    ports:
      - "3000:80"

volumes:
  postgres-data:
