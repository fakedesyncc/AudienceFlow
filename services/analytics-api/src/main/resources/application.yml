server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: audienceflow-analytics-api
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/audienceflow}
    username: ${JDBC_DATABASE_USERNAME:audienceflow}
    password: ${JDBC_DATABASE_PASSWORD:}
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:}
    ttl-minutes: ${JWT_TTL_MINUTES:720}
  live:
    interval-ms: ${LIVE_INTERVAL_MS:5000}
  seed:
    admin-email: ${ADMIN_EMAIL:}
    admin-password: ${ADMIN_PASSWORD:}
    technician-email: ${TECHNICIAN_EMAIL:}
    technician-password: ${TECHNICIAN_PASSWORD:}
    teacher-email: ${TEACHER_EMAIL:}
    teacher-password: ${TEACHER_PASSWORD:}
